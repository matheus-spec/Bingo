<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="App de Bingo - Sorteio de números de 1 a 90">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bingo">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23667eea' width='192' height='192'/><text x='96' y='120' font-size='80' font-weight='bold' text-anchor='middle' fill='white' font-family='Arial'>🎰</text></svg>">
    <link rel="manifest" href="manifest.json">
    <title>Bingo - Sorteio de Números</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23667eea' width='100' height='100'/><text x='50' y='75' font-size='60' text-anchor='middle' fill='white' font-family='Arial'>🎰</text></svg>">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎰 Bingo</h1>
            <p class="subtitle">Sorteio de Números</p>
        </div>

        <div class="main-content">
            <!-- Painel do Sorteio -->
            <div class="draw-panel">
                <div class="current-number">
                    <div id="currentNumber" class="big-number">-</div>
                </div>
                
                <div class="buttons">
                    <button id="drawBtn" class="btn btn-primary">
                        Sortear Número
                    </button>
                    <button id="resetBtn" class="btn btn-danger">
                        Reiniciar Partida
                    </button>
                </div>

                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">Números Sorteados:</span>
                        <span id="drawnCount" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Números Restantes:</span>
                        <span id="remainingCount" class="stat-value">90</span>
                    </div>
                </div>
            </div>

            <!-- Histórico de Números -->
            <div class="history-panel">
                <h2>Números Sorteados</h2>
                <div id="historyGrid" class="history-grid">
                    <!-- Números será preenchidos dinamicamente -->
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Clique em "Sortear Número" para iniciar! 🎯</p>
        </div>
    </div>

    <script src="script.js"></script>
    
    <!-- Registrar Service Worker para PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker registrado com sucesso!'))
                    .catch(err => console.log('Erro ao registrar Service Worker:', err));
            });
        }
    </script>
</body>
</html>
